<title>Treino Crossfit - Plano de 12 Semanas</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html { -webkit-text-size-adjust: 100%; }
  
  /* в”Ђв”Ђ CSS Variables for Light/Dark Mode в”Ђв”Ђ */
  :root {
    --bg-primary: #F1EFE8;
    --bg-secondary: #fff;
    --bg-tertiary: #F1EFE8;
    --text-primary: #2C2C2A;
    --text-secondary: #5F5E5A;
    --text-tertiary: #888780;
    --border-color: #D3D1C7;
    --header-bg: #2C2C2A;
    --header-text: #fff;
    --card-shadow: rgba(0,0,0,0.06);
    --exercise-link: #378ADD;
    --exercise-link-hover: #185FA5;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg-primary: #1C1C1A;
      --bg-secondary: #2C2C2A;
      --bg-tertiary: #1C1C1A;
      --text-primary: #F1EFE8;
      --text-secondary: #B4B2A9;
      --text-tertiary: #888780;
      --border-color: #444441;
      --header-bg: #0A0A09;
      --header-text: #F1EFE8;
      --card-shadow: rgba(0,0,0,0.3);
      --exercise-link: #85B7EB;
      --exercise-link-hover: #B5D4F4;
    }
  }

  body { 
    font-family: -apple-system, 'SF Pro Text', Arial, sans-serif; 
    background: var(--bg-primary); 
    color: var(--text-primary); 
    min-height: 100vh; 
    padding-bottom: env(safe-area-inset-bottom, 20px); 
  }

  /* в”Ђв”Ђ Header в”Ђв”Ђ */
  .header { 
    background: var(--header-bg); 
    padding: 16px 16px 12px; 
    padding-top: calc(env(safe-area-inset-top, 0px) + 16px); 
    position: sticky; 
    top: 0; 
    z-index: 100; 
  }
  .header h1 { font-size: 17px; font-weight: 600; color: var(--header-text); letter-spacing: -0.3px; }
  .header p { font-size: 12px; color: var(--text-tertiary); margin-top: 2px; }

  /* в”Ђв”Ђ Phase pills (horizontal scroll) в”Ђв”Ђ */
  .ph-scroll { 
    overflow-x: auto; 
    -webkit-overflow-scrolling: touch; 
    scrollbar-width: none; 
    padding: 10px 16px; 
    display: flex; 
    gap: 8px; 
    background: var(--header-bg); 
  }
  .ph-scroll::-webkit-scrollbar { display: none; }
  .ph-btn { 
    flex-shrink: 0; 
    padding: 8px 14px; 
    border-radius: 20px; 
    border: 1.5px solid transparent; 
    font-family: inherit; 
    font-size: 13px; 
    font-weight: 600; 
    cursor: pointer; 
    transition: all 0.15s; 
    white-space: nowrap; 
  }

  /* в”Ђв”Ђ Focus bar в”Ђв”Ђ */
  .focus-bar { 
    margin: 0; 
    padding: 10px 16px; 
    font-size: 12px; 
    line-height: 1.55; 
    color: var(--text-secondary); 
    background: var(--bg-secondary); 
    border-bottom: 0.5px solid var(--border-color); 
  }

  /* в”Ђв”Ђ Week scroller в”Ђв”Ђ */
  .wk-scroll { 
    overflow-x: auto; 
    -webkit-overflow-scrolling: touch; 
    scrollbar-width: none; 
    padding: 10px 16px; 
    display: flex; 
    gap: 8px; 
    background: var(--bg-secondary); 
    border-bottom: 0.5px solid var(--border-color); 
  }
  .wk-scroll::-webkit-scrollbar { display: none; }
  .wk-btn { 
    flex-shrink: 0; 
    min-width: 64px; 
    padding: 8px 10px; 
    border-radius: 10px; 
    border: 1px solid var(--border-color); 
    background: transparent; 
    color: var(--text-secondary); 
    font-family: inherit; 
    font-size: 13px; 
    font-weight: 500; 
    cursor: pointer; 
    text-align: center; 
  }
  .wk-btn.act { background: #E6F1FB; border-color: #378ADD; color: #185FA5; font-weight: 600; }

  @media (prefers-color-scheme: dark) {
    .wk-btn.act { background: #1A3A52; border-color: #378ADD; color: #85B7EB; }
  }

  /* в”Ђв”Ђ Day tabs в”Ђв”Ђ */

  .dy-btn { 
    flex: 1; 
    padding: 12px 8px; 
    border: none; 
    border-bottom: 3px solid transparent; 
    background: transparent; 
    color: var(--text-tertiary); 
    font-family: inherit; 
    font-size: 14px; 
    font-weight: 500; 
    cursor: pointer; 
  }
  .dy-btn.act { color: #185FA5; border-bottom-color: #378ADD; font-weight: 600; }

  @media (prefers-color-scheme: dark) {
    .dy-btn.act { color: #85B7EB; border-bottom-color: #378ADD; }
  }

  /* в”Ђв”Ђ Content в”Ђв”Ђ */
  .content { padding: 12px 16px 32px; }

  /* в”Ђв”Ђ Blocks в”Ђв”Ђ */
  .blk { 
    background: var(--bg-secondary); 
    border-radius: 14px; 
    padding: 14px; 
    margin-bottom: 10px; 
    box-shadow: 0 1px 3px var(--card-shadow); 
  }
  .blk-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
  .blk-left { display: flex; align-items: center; gap: 8px; }
  .dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .blk-title { font-size: 13px; font-weight: 600; color: var(--text-primary); }
  .chip { 
    font-size: 11px; 
    color: var(--text-secondary); 
    background: var(--bg-tertiary); 
    padding: 3px 8px; 
    border-radius: 6px; 
    white-space: nowrap; 
  }
  .wchip { 
    font-size: 11px; 
    padding: 3px 8px; 
    border-radius: 6px; 
    background: #FAEEDA; 
    color: #BA7517; 
    font-weight: 600; 
    white-space: nowrap; 
  }

  }

    font-size: 14px; 
    color: var(--text-primary); 
    line-height: 1.5; 
    padding: 6px 0; 
    border-bottom: 0.5px solid var(--border-color);

    align-items: flex-start; 
    gap: 8px;

    content: ''; 
    width: 5px; 
    height: 5px; 
    border-radius: 50%; 
    background: #1D9E75; 
    margin-top: 7px;

  }

  .sk-name { font-size: 15px; font-weight: 600; color: #3C3489; margin-bottom: 6px; line-height: 1.3; }
  .sk-desc { font-size: 13px; color: var(--text-secondary); font-style: italic; line-height: 1.55; margin-bottom: 10px; }
  .sk-sets-box { background: #EEEDFE; border-radius: 8px; padding: 10px 12px; }
  .sk-sets-label { 
    font-size: 10px;

    color: #7F77DD; 
    text-transform: uppercase; 
    letter-spacing: 0.5px;

  .sk-sets { font-size: 13px; font-weight: 600; color: #3C3489; line-height: 1.5; }

    .sk-sets-label { color: #AFA9EC; }

  }

  .wd-format-row { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; flex-wrap: wrap; }
  .wd-list { list-style: none; padding: 0; }

    font-size: 14px; 
    color: var(--text-primary); 
    padding: 6px 0; 
    border-bottom: 0.5px solid var(--border-color); 
    display: flex; 
    align-items: flex-start; 
    gap: 8px; 
    line-height: 1.5; 
  }
  .wd-list li:last-child { border-bottom: none; }
  .wd-list li::before { 
    content: ''; 
    width: 5px; 
    height: 5px; 
    border-radius: 50%; 
    background: #EF9F27; 
    margin-top: 7px; 
    flex-shrink: 0;

  .tip { 
    margin-top: 10px; 
    padding: 8px 10px; 
    background: #FFF8EE; 
    border-radius: 8px; 
    font-size: 12px; 
    color: #854F0B; 
    line-height: 1.5; 
  }
  .tip::before { content: 'рџ’Ў '; }

  @media (prefers-color-scheme: dark) {
    .tip { background: #3D2F0F; color: #FAC775; }
  }

  /* Test week badge */
  .test-badge { 
    display: inline-block; 
    background: #FAECE7; 
    color: #993C1D; 
    font-size: 10px; 
    font-weight: 700; 
    padding: 2px 7px; 
    border-radius: 5px; 
    text-transform: uppercase; 
    letter-spacing: 0.4px; 
    margin-left: 6px; 
    vertical-align: middle; 
  }

  @media (prefers-color-scheme: dark) {
    .test-badge { background: #4A1B0C; color: #F5C4B3; }
  }

  /* Exercise links */
  .exercise-link {
    color: var(--exercise-link);
    text-decoration: none;
    border-bottom: 1px solid transparent;
    transition: all 0.15s;
  }
  .exercise-link:hover {
    color: var(--exercise-link-hover);

  /* Add to home screen hint */
  .install-hint {

    background: #E1F5EE; 
    border-radius: 10px; 
    font-size: 12px; 
    color: #085041; 
    line-height: 1.5; 
    display: flex; 
    align-items: flex-start; 
    gap: 8px; 
  }
  .install-hint-icon { font-size: 16px; flex-shrink: 0; margin-top: 1px; }
  .install-hint-close { 
    margin-left: auto; 
    font-size: 16px; 
    cursor: pointer; 
    color: #1D9E75; 
    flex-shrink: 0; 
    padding: 0 0 0 8px; 
  }

  @media (prefers-color-scheme: dark) {
    .install-hint { background: #0F3A2C; color: #9FE1CB; }
    .install-hint-close { color: #5DCAA5; }
  }
</style>

// Function to make exercise names clickable
function linkifyExercises(text) {
  let result = text;
  
  // Sort by length (longest first) to match "chest to bar" before "bar"
  const sortedExercises = Object.keys(EXERCISE_LINKS).sort((a, b) => b.length - a.length);
  
  for (const exercise of sortedExercises) {
    const url = EXERCISE_LINKS[exercise];
    // Case-insensitive match, preserve original case
    const regex = new RegExp(`\\b(${exercise})\\b`, 'gi');
    result = result.replace(regex, (match) => {
      return `<a href="${url}" class="exercise-link" target="_blank" rel="noopener">${match}</a>`;
    });
  }
  
  return result;
}

  document.getElementById('ph-row').innerHTML=Object.entries(PH).map(([k,v])=>{
    const on=+k===cp;
    return `<button class="ph-btn" onclick="sph(${k})" style="background:${on?v.bg:'rgba(255,255,255,0.08)'};border-color:${on?v.c:'transparent'};color:${on?v.c:'#B4B2A9'}">${v.l}</button>`;
  }).join('');
}

function renderWK(){
  const ph=PH[cp];
  document.getElementById('wk-row').innerHTML=ph.wks.map(w=>{
    const isTest=[4,8,12].includes(w);
    const label=`Sem ${w}${isTest?' рџЋЇ':''}`;
    return `<button class="wk-btn${w===cw?' act':''}" onclick="sw(${w})">${label}</button>`;
  }).join('');
  document.getElementById('focus-bar').textContent=ph.f;
}

function renderCON(){
  const s=D[cw][cd];
  const isTest=[4,8,12].includes(cw);
  const testBadge=isTest?'<span class="test-badge">Semana de Teste</span>':'';

  const wu=s.wu.map(x=>`<li>${linkifyExercises(x)}</li>`).join('');
  const wdm=s.wd.m.map(x=>`<li>${linkifyExercises(x)}</li>`).join('');
  const cap=s.wd.cp?`<span class="chip">cap ${s.wd.cp}</span>`:'';
  const tip=s.wd.nt?`<div class="tip">${linkifyExercises(s.wd.nt)}</div>`:'';

  document.getElementById('con').innerHTML=`
    ${isTest?`<div style="background:#FAECE7;border-radius:10px;padding:10px 12px;margin-bottom:10px;font-size:13px;color:#993C1D;font-weight:500;">рџЋЇ Semana de Teste вЂ” registre todos os resultados para acompanhar sua evoluГ§ГЈo.</div>`:''}

    <div class="blk">
      <div class="blk-header">
        <div class="blk-left"><div class="dot" style="background:#1D9E75"></div><span class="blk-title">Warm Up</span></div>
        <span class="chip">8вЂ“10 min</span>
      </div>
      <ul class="wu-list">${wu}</ul>
    </div>

    <div class="blk">
      <div class="blk-header">
        <div class="blk-left"><div class="dot" style="background:#7F77DD"></div><span class="blk-title">Skill</span></div>
        <span class="chip">12вЂ“15 min</span>
      </div>
      <div class="sk-name">${linkifyExercises(s.sk.n)}${testBadge}</div>
      <div class="sk-desc">${linkifyExercises(s.sk.d)}</div>
      <div class="sk-sets-box">
        <div class="sk-sets-label">PrescriГ§ГЈo</div>
        <div class="sk-sets">${linkifyExercises(s.sk.s)}</div>
      </div>
    </div>

    <div class="blk">
      <div class="blk-header">
        <div class="blk-left"><div class="dot" style="background:#EF9F27"></div><span class="blk-title">WOD</span></div>
      </div>
      <div class="wd-format-row">
        <span class="wchip">${s.wd.f}</span>${cap}
      </div>
      <ul class="wd-list">${wdm}</ul>
      ${tip}
    </div>`;
}

function sph(p){cp=p;cw=PH[p].wks[0];renderPH();renderWK();renderCON();window.scrollTo({top:0,behavior:'smooth'});}
function sw(w){cw=w;renderWK();renderCON();window.scrollTo({top:document.querySelector('.day-tabs').offsetTop-1,behavior:'smooth'});}
function sd(d){cd=d;['seg','qua','sex'].forEach(x=>{document.getElementById('b-'+x).className='dy-btn'+(x===d?' act':'')});renderCON();window.scrollTo({top:document.querySelector('.content').offsetTop,behavior:'smooth'});}

renderPH();renderWK();renderCON();
</script>
</body>
</html>
